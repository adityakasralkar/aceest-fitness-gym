version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aceest-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:///aceest.db
      - SECRET_KEY=dev-secret-key
    volumes:
      - ./backend:/app
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: aceest-db
    environment:
      - POSTGRES_DB=aceest
      - POSTGRES_USER=aceest_user
      - POSTGRES_PASSWORD=aceest_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
